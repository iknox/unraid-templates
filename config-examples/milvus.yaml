# Milvus Standalone config — only the keys that differ from defaults.
# Full reference: https://github.com/milvus-io/milvus/blob/v2.6.15/configs/milvus.yaml

etcd:
  endpoints:
    - milvus-etcd:2379
  rootPath: by-dev
  metaSubPath: meta
  kvSubPath: kv

minio:
  # Garage service on the shared milvus-net bridge.
  address: garage
  port: 3900
  # Paste the values from `garage key info milvus-key` after bootstrap.
  accessKeyID: REPLACE_WITH_GARAGE_ACCESS_KEY
  secretAccessKey: REPLACE_WITH_GARAGE_SECRET_KEY
  useSSL: false
  # Bucket created via `garage bucket create milvus`.
  bucketName: milvus
  rootPath: files
  # Garage supports path-style; virtual-host requires wildcard DNS we don't have.
  useVirtualHost: false
  # Must match `s3_region` in garage.toml. SigV4 will reject mismatches with
  # AuthorizationHeaderMalformed if these disagree.
  region: garage
  cloudProvider: aws
  useIAM: false

common:
  storageType: remote

# MUST be rocksmq for standalone; image default is kafka which tries localhost:9092
mq:
  type: rocksmq

# MUST be explicit; empty default causes QueryNode FATAL: mkdir: no such file or directory
localStorage:
  path: /var/lib/milvus/data

rocksmq:
  path: /var/lib/milvus/rdb_data

# Pin internal service ports. On 2.6+ RootCoord is consolidated into
# MixCoord, which reads rootCoord.port — default is 22125.
proxy:
  port: 19530
rootCoord:
  port: 22125
dataCoord:
  port: 13333
queryCoord:
  port: 19531
queryNode:
  port: 21123
dataNode:
  port: 21124
indexCoord:
  port: 31000
indexNode:
  port: 21121

log:
  level: info
