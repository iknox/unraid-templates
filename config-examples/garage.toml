metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"
db_engine    = "sqlite"

replication_factor = 1

rpc_bind_addr   = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
# Generate once with: openssl rand -hex 32
rpc_secret = "REPLACE_WITH_OPENSSL_RAND_HEX_32"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region     = "garage"
root_domain   = ".s3.garage.local"

[admin]
api_bind_addr = "[::]:3903"
# Generate once with: openssl rand -hex 32
admin_token = "REPLACE_WITH_OPENSSL_RAND_HEX_32"
# Metrics token optional; set to a random value if you want /metrics auth.
metrics_token = "REPLACE_WITH_OPENSSL_RAND_HEX_32"
