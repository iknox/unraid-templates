# Place at /mnt/user/appdata/llama-swap/config.yaml.
# Edits hot-reload when the container is run with `-watch-config`.
#
# Ports: llama-swap listens on the container's 8080; each model's
# llama-server child gets an internal port starting at 5800.
# The ${PORT} macro below expands to that auto-assigned port.
#
# Full schema: https://github.com/mostlygeek/llama-swap/blob/main/config.example.yaml

healthCheckTimeout: 120
startPort: 5800
logLevel: info
logRequests: false
globalTTL: 10800

models:
  # Tiny smoke-test model. Proves the GPU path without loading weights.
  llama-3.2-3b_TEST:
    cmd: |
      /app/llama-server
      --host 0.0.0.0 --port ${PORT}
      -m /models/Llama-3.2-3B-Instruct-GGUF/Llama-3.2-3B-Instruct-Q4_K_M.gguf
      -ngl 999
      -c 8192
      --flash-attn on
    ttl: 10800

  # Daily-driver coder. Pure transformer MoE, no hybrid SSM/DeltaNet.
  # 30B total / 3B active. Same architecture as Qwen3-30B-A3B (87 tok/s
  # baseline) with code post-training; expect ~80-95 tok/s gen on Strix
  # Halo. Q8 KV cache halves the per-token KV bandwidth tax — meaningful
  # at 128K context with frequent agentic tool turns.
  #
  # --jinja is mandatory for tool calls (issue #22581: --chat-template
  # chatml breaks the bundled tool parser). Sampling per Qwen-Coder card.
  qwen3-coder-30b_CODE:
    cmd: |
      /app/llama-server
      --host 0.0.0.0 --port ${PORT}
      -m /models/Qwen3-Coder-30B-A3B-Instruct-GGUF/Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf
      -ngl 999
      -c 131072
      --flash-attn on
      --jinja
      --parallel 2
      --batch-size 4096
      --ubatch-size 4096
      --temp 0.7
      --top-p 0.8
      --top-k 20
    ttl: 10800

  # General-purpose / multimodal. Qwen3.6-35B-A3B with MTP heads, 39 GB
  # Q8_K_XL plus mmproj for vision. Hybrid SSM architecture: each turn
  # of an agentic loop forces full prompt reprocess (recurrent state
  # can't be partially restored — see llama.cpp PR #22929/#22940). NOT a
  # Claude Code daily driver; use for one-shot tasks, vision, RAG, or
  # smart-home agents (Hermes etc.) where each query is fresh.
  #
  # BLOCKED loading until mostlygeek/llama-swap:vulkan rebuilds with
  # llama.cpp >= 2026-05-16 12:06 UTC (PR #22673 merge, tag b9190+).
  # The --spec-type draft-mtp flag will re-enable speculative decoding
  # then; today's build emits "unknown speculative type: draft-mtp".
  qwen3.6-35b-mtp_GEN_PURPOSE:
    cmd: |
      /app/llama-server
      --host 0.0.0.0 --port ${PORT}
      -m /models/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-Q8_K_XL.gguf
      --mmproj /models/Qwen3.6-35B-A3B-MTP-GGUF/mmproj-F16.gguf
      -ngl 999
      -c 32768
      --flash-attn on
      --temp 0.6
      --top-p 0.95
      --top-k 20
      --min-p 0.00
      --presence-penalty 0.0
      --parallel 2
      --batch-size 4096
      --ubatch-size 4096
    ttl: 10800
