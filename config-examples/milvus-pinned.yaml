# Diagnostic config for Milvus 2.5.x Standalone with:
# - Explicit port pins for every coord/node (avoids :19530 collision)
# - rocksmq MQ type (never kafka — kafka is the image default that breaks standalone)
# - Explicit localStorage path (QueryNode FATALs with empty default)

etcd:
  endpoints:
    - milvus-etcd:2379
  rootPath: by-dev

minio:
  address: garage
  port: 3900
  accessKeyID: REPLACE_WITH_GARAGE_ACCESS_KEY
  secretAccessKey: REPLACE_WITH_GARAGE_SECRET_KEY
  useSSL: false
  bucketName: milvus
  rootPath: files
  useVirtualHost: false
  region: garage

common:
  storageType: remote

# MUST be rocksmq for standalone; image default kafka breaks with localhost:9092 refused
mq:
  type: rocksmq

# MUST be explicit; empty default causes QueryNode FATAL: mkdir: no such file or directory
localStorage:
  path: /var/lib/milvus/data

rocksmq:
  path: /var/lib/milvus/rdb_data

proxy:
  port: 19530
rootCoord:
  port: 22125
dataCoord:
  port: 13333
queryCoord:
  port: 19531
queryNode:
  port: 21123
dataNode:
  port: 21124
indexCoord:
  port: 31000
indexNode:
  port: 21121
